name: Scheduled Jobs

on:
  schedule:
    # Run daily at 2:00 AM UTC (adjust as needed)
    - cron: '30 1-13 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run mainRunner.py
        run: python mainRunner.py
        
      - name: Export DB to JSON
        run: python export_to_json.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/data.json
          git commit -m "Auto-generate data.json" || echo "No changes to commit"
          git push
          
      - name: Generate static site
        run: python site.py --generate-static
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: job-results
          path: output/
          retention-days: 30

  deploy-to-pages:
    needs: run-jobs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: job-results
          path: output/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
